name: Release-Docker

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: python

  build-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Nuevo paso: Autenticación segura con Docker Hub
      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y empujar imagen de Docker
        run: |
          VERSION=${{ needs.release-please.outputs.tag_name }}
          # Definimos el nombre del repositorio en Docker Hub
          # Formato: usuario/nombre-de-la-imagen
          DOCKER_REPO="${{ secrets.DOCKER_USERNAME }}/poo-semana3-actividad"
          
          echo "Construyendo imagen $DOCKER_REPO:$VERSION..."
          
          # Construimos la imagen con la versión específica
          docker build -t $DOCKER_REPO:$VERSION .
          
          # Etiquetamos también como 'latest' (última versión)
          docker tag $DOCKER_REPO:$VERSION $DOCKER_REPO:latest
          
          echo "Subiendo imágenes a Docker Hub..."
          # Empujamos ambas etiquetas
          docker push $DOCKER_REPO:$VERSION
          docker push $DOCKER_REPO:latest
